services:
  app:
    build: .
    image: eng-vocab
    container_name: eng-vocab
    ports:
      - "8000:8000"
    # Tự khởi động lại khi crash, và tự chạy lại khi máy/Docker khởi động lại
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      # Thời gian chờ app khởi động trước khi bắt đầu tính health check là fail.
      # Máy phần cứng thấp khởi động lâu -> để dư dả (60s). Trong khoảng này nếu
      # check fail sẽ KHÔNG bị tính, container vẫn ở trạng thái "starting".
      start_period: 300s
